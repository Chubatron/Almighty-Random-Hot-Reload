[kivy_reloader]
# Включаем горячую перезагрузку на телефоне
HOT_RELOAD_ON_PHONE = true

# Способ передачи: USB
STREAM_USING = "USB"

# Файлы, при изменении которых приложение перезапускается полностью
FULL_RELOAD_FILES = ["main.py"]

# Папки, за которыми следим для горячей перезагрузки
WATCHED_FOLDERS_RECURSIVELY = ["screens", "components", "locales", "assets"]

# Путь к buildozer.spec
[buildozer]
spec_file = "buildozer.spec"

# Настройки для первого запуска
[buildozer.first_install]
requirements = "python3,kivy==2.3.0,requests,numpy,chardet,charset_normalizer,pillow,android,sdl2,pyjnius,plyer"